{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>AngelicaAI | {% block title %}{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <style>
        body { margin: 0; background: #111; color: #fff; }
        .page-header { padding: 1.5rem 0; }
        .page-header h1 { margin: 0; font-size: 1.8rem; }
        .card { background: rgba(0, 0, 0, 0.75); border: 1px solid rgba(255,255,255,0.08); }
        .form-control { background: rgba(255, 255, 255, 0.08); color: #fff; border: 1px solid rgba(255,255,255,0.12); }
        .form-control:focus { background: rgba(255, 255, 255, 0.12); color: #fff; }
        .btn-primary { background: #5c6ac4; border-color: #4a55a1; }
        .message-box { margin-bottom: 1rem; }
        .webgl { width: 100%; display: block; border-radius: 0.4rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">AngelicaAI Assistant</a>
        </div>
    </nav>

    <main class="container py-4">
        {% if messages %}
            <div class="message-box">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock content %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/lodash.js/0.10.0/lodash.min.js"></script>
</body>
</html>
